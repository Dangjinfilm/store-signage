<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Signage Pro - Windows Edition</title>
    
    <!-- Tailwind CSS (디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (React 코드 번역) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #000000; margin: 0; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }
        .player-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        
        /* 💡 화면 꽉 채우기용 특수 CSS */
        .fit-screen-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 56.25vw; /* 16:9 비율 유지 */
            min-height: 100vh;
            min-width: 177.77vh; /* 16:9 비율 유지 */
            transform: translate(-50%, -50%);
        }
        .normal-screen-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback } = React;

        // ==========================================
        // 🚀 안정적인 자체 제작 YouTube Player 엔진
        // ==========================================
        const YouTubePlayer = ({ videoId, isPlaying, isMuted, isFitScreen, onEnded, onError }) => {
            const playerRef = useRef(null);
            const containerRef = useRef(null);
            const initialized = useRef(false);
            const [isReady, setIsReady] = useState(false);

            useEffect(() => {
                if (initialized.current || !videoId) return;
                initialized.current = true;

                const initPlayer = () => {
                    if (!containerRef.current) return;
                    
                    const el = document.createElement('div');
                    containerRef.current.appendChild(el);

                    const currentOrigin = (window.location.origin && window.location.origin !== "null") 
                        ? window.location.origin 
                        : "https://localhost";

                    playerRef.current = new window.YT.Player(el, {
                        width: '100%',
                        height: '100%',
                        videoId: videoId,
                        host: 'https://www.youtube.com',
                        playerVars: {
                            autoplay: 1,
                            controls: 0,
                            rel: 0,
                            modestbranding: 1,
                            mute: isMuted ? 1 : 0,
                            enablejsapi: 1,
                            disablekb: 1,
                            playsinline: 1,
                            origin: currentOrigin,          
                            widget_referrer: currentOrigin  
                        },
                        events: {
                            onReady: (e) => {
                                setIsReady(true);
                                if (isPlaying) e.target.playVideo();
                            },
                            onStateChange: (e) => {
                                if (e.data === window.YT.PlayerState.ENDED) onEnded();
                            },
                            onError: (e) => onError(e.data)
                        }
                    });
                };

                if (!window.YT || !window.YT.Player) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.head.appendChild(tag);
                    window.onYouTubeIframeAPIReady = initPlayer;
                } else {
                    initPlayer();
                }

                return () => {
                    if (playerRef.current && playerRef.current.destroy) {
                        playerRef.current.destroy();
                    }
                    if (containerRef.current) {
                        containerRef.current.innerHTML = '';
                    }
                };
            }, [videoId]);

            useEffect(() => {
                if (isReady && playerRef.current && playerRef.current.loadVideoById) {
                    playerRef.current.loadVideoById(videoId);
                }
            }, [videoId, isReady]);

            useEffect(() => {
                if (isReady && playerRef.current) {
                    if (isPlaying) playerRef.current.playVideo();
                    else playerRef.current.pauseVideo();
                }
            }, [isPlaying, isReady]);

            useEffect(() => {
                if (isReady && playerRef.current && playerRef.current.mute) {
                    if (isMuted) playerRef.current.mute();
                    else playerRef.current.unMute();
                }
            }, [isMuted, isReady]);

            return <div ref={containerRef} className={isFitScreen ? "fit-screen-container" : "normal-screen-container"}></div>;
        };


        // ==========================================
        //  메인 앱 컴포넌트
        // ==========================================
        const App = () => {
            const [playlist, setPlaylist] = useState([]);
            const [inputUrl, setInputUrl] = useState('');
            const [bulkInput, setBulkInput] = useState('');
            const [showBulkAdd, setShowBulkAdd] = useState(false);
            
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isPlaying, setIsPlaying] = useState(true);
            const [isShuffle, setIsShuffle] = useState(false);
            const [isMuted, setIsMuted] = useState(true);
            
            // 💡 화면 맞춤, 보안 상태 관리
            const [isFitScreen, setIsFitScreen] = useState(true);
            const [isLocked, setIsLocked] = useState(true); 
            const [showPinModal, setShowPinModal] = useState(false);
            const [enteredPin, setEnteredPin] = useState('');
            
            // 💡 비밀번호 변경 로직을 위한 상태 변수
            const [savedPin, setSavedPin] = useState("0000"); // 초기 비밀번호
            const [pinMode, setPinMode] = useState("unlock"); // "unlock", "check_current", "enter_new", "confirm_new"
            const [tempPin, setTempPin] = useState("");
            
            const [showControls, setShowControls] = useState(true);
            const [errorMessage, setErrorMessage] = useState('');
            const [currentTime, setCurrentTime] = useState(new Date());

            const controlsTimeoutRef = useRef(null);
            const storageKey = 'win_signage_playlist_v8';
            const PIN_STORAGE_KEY = 'win_signage_pin_v1';

            // 데이터 및 커스텀 비밀번호 로드
            useEffect(() => {
                try {
                    const saved = localStorage.getItem(storageKey);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if(parsed.length > 0) setPlaylist(parsed);
                    }
                    
                    const savedPinCode = localStorage.getItem(PIN_STORAGE_KEY);
                    if (savedPinCode) {
                        setSavedPin(savedPinCode);
                    }
                } catch (e) { console.error("데이터 로드 오류:", e); }
                
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // 플레이리스트 저장
            useEffect(() => {
                localStorage.setItem(storageKey, JSON.stringify(playlist));
            }, [playlist]);

            const extractVideoId = (url) => {
                const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
                const match = url.trim().match(regExp);
                return (match && match[2].length === 11) ? match[2] : null;
            };

            const addVideo = () => {
                const videoId = extractVideoId(inputUrl);
                if (videoId) {
                    const newPlaylist = [...playlist, { id: Date.now(), videoId }];
                    setPlaylist(newPlaylist);
                    setInputUrl('');
                    if(newPlaylist.length === 1) {
                        setCurrentIndex(0);
                        setIsPlaying(true);
                    }
                } else {
                    setErrorMessage("올바른 유튜브 링크가 아닙니다.");
                    setTimeout(() => setErrorMessage(''), 3000);
                }
            };

            const handleBulkAdd = () => {
                const urls = bulkInput.split('\n');
                const newVideos = [];
                urls.forEach(url => {
                    const videoId = extractVideoId(url);
                    if (videoId) newVideos.push({ id: Date.now() + Math.random(), videoId });
                });

                if (newVideos.length > 0) {
                    const updatedPlaylist = [...playlist, ...newVideos];
                    setPlaylist(updatedPlaylist);
                    setBulkInput('');
                    setShowBulkAdd(false);
                    if(playlist.length === 0) {
                        setCurrentIndex(0);
                        setIsPlaying(true);
                    }
                } else {
                    setErrorMessage("추가할 수 있는 링크가 없습니다.");
                    setTimeout(() => setErrorMessage(''), 3000);
                }
            };

            // 💡 플레이리스트 내보내기 (Export & 자동 클립보드 복사 연동)
            const exportPlaylist = () => {
                if (playlist.length === 0) {
                    setErrorMessage("추출할 영상 목록이 없습니다.");
                    setTimeout(() => setErrorMessage(''), 3000);
                    return;
                }
                
                const urlList = playlist.map(v => `https://www.youtube.com/watch?v=${v.videoId}`).join('\n');
                setBulkInput(urlList); // 텍스트창에 표시
                
                // 클립보드에 강제 복사 시도 (브라우저 호환성 및 iFrame 보안 우회)
                const textArea = document.createElement("textarea");
                textArea.value = urlList;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setErrorMessage("현재 목록이 텍스트창에 추출되었으며, 클립보드(복사하기)에도 자동 저장되었습니다.");
                } catch (err) {
                    setErrorMessage("현재 재생 목록이 텍스트로 추출되었습니다. 직접 드래그하여 복사해 주세요.");
                }
                document.body.removeChild(textArea);
                
                setTimeout(() => setErrorMessage(''), 4000);
            };

            const removeVideo = (id) => {
                const newPlaylist = playlist.filter(v => v.id !== id);
                setPlaylist(newPlaylist);
                if (newPlaylist.length === 0) {
                    setIsPlaying(false);
                } else if (currentIndex >= newPlaylist.length) {
                    setCurrentIndex(0);
                }
            };

            const handleNext = () => {
                if (playlist.length <= 1) {
                    setCurrentIndex(0);
                    return;
                }
                const nextIndex = isShuffle 
                    ? Math.floor(Math.random() * playlist.length) 
                    : (currentIndex + 1) % playlist.length;
                setCurrentIndex(nextIndex);
                setIsPlaying(true);
            };

            const handleError = (errorCode) => {
                if (errorCode === 150 || errorCode === 101 || errorCode === 153) {
                    setErrorMessage("저작권(BGM 등) 문제로 재생이 막힌 영상입니다. 스킵됩니다.");
                } else {
                    setErrorMessage(`재생 오류 발생 (코드: ${errorCode}). 자동 스킵됩니다.`);
                }
                setTimeout(() => setErrorMessage(''), 4000);

                setPlaylist(prev => {
                    const newList = prev.filter((_, i) => i !== currentIndex);
                    if (newList.length === 0) setIsPlaying(false);
                    return newList;
                });
                
                setCurrentIndex(prev => {
                    if (playlist.length <= 1) return 0;
                    return prev >= playlist.length - 1 ? 0 : prev;
                });
            };

            const toggleFullscreen = () => {
                try {
                    if (!document.fullscreenElement) {
                        const promise = document.documentElement.requestFullscreen();
                        if (promise !== undefined) promise.catch(() => {});
                    } else if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                } catch (e) {}
            };

            // 단축키 로직
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        toggleFullscreen();
                        setShowControls(false); 
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            const handleMouseMove = () => {
                if (!showPinModal) setShowControls(true);
                if (controlsTimeoutRef.current) clearTimeout(controlsTimeoutRef.current);
                controlsTimeoutRef.current = setTimeout(() => {
                    if (isPlaying && !showPinModal) setShowControls(false);
                }, 4000); 
            };

            // 💡 키패드 입력 처리 (잠금 해제 및 비밀번호 변경 다중 처리)
            const handlePinInput = (num) => {
                if (enteredPin.length < 4) {
                    const newPin = enteredPin + num;
                    setEnteredPin(newPin);
                    
                    if (newPin.length === 4) {
                        // 시각적 피드백을 위해 0.1초 딜레이 후 로직 처리
                        setTimeout(() => {
                            if (pinMode === "unlock") {
                                if (newPin === savedPin) {
                                    setIsLocked(false);
                                    setShowPinModal(false);
                                    setErrorMessage("보안 잠금이 해제되었습니다.");
                                } else {
                                    setErrorMessage("비밀번호가 일치하지 않습니다.");
                                }
                                setEnteredPin('');
                            } 
                            else if (pinMode === "check_current") {
                                if (newPin === savedPin) {
                                    setPinMode("enter_new");
                                    setErrorMessage("인증 성공. 새로운 비밀번호를 입력하세요.");
                                } else {
                                    setErrorMessage("현재 비밀번호가 틀렸습니다.");
                                    setPinMode("unlock"); // 틀리면 다시 잠금해제 모드로 튕겨냄
                                    setShowPinModal(false);
                                }
                                setEnteredPin('');
                            } 
                            else if (pinMode === "enter_new") {
                                setTempPin(newPin);
                                setPinMode("confirm_new");
                                setErrorMessage("새 비밀번호를 한 번 더 입력하세요.");
                                setEnteredPin('');
                            } 
                            else if (pinMode === "confirm_new") {
                                if (newPin === tempPin) {
                                    setSavedPin(newPin);
                                    localStorage.setItem(PIN_STORAGE_KEY, newPin);
                                    setShowPinModal(false);
                                    setPinMode("unlock"); // 초기화
                                    setErrorMessage("비밀번호가 성공적으로 변경되었습니다.");
                                } else {
                                    setErrorMessage("비밀번호가 서로 다릅니다. 다시 설정하세요.");
                                    setPinMode("enter_new");
                                }
                                setEnteredPin('');
                                setTempPin('');
                            }
                            setTimeout(() => setErrorMessage(''), 3000);
                        }, 150);
                    }
                }
            };

            // 일반 잠금 전환 버튼 로직
            const toggleLock = () => {
                if (isLocked) {
                    setPinMode("unlock");
                    setShowPinModal(true);
                } else {
                    setIsLocked(true);
                    setShowControls(false);
                    setErrorMessage("패널이 잠금 처리되었습니다.");
                    setTimeout(() => setErrorMessage(''), 3000);
                }
            };

            // 💡 모달창 동적 텍스트 생성
            let modalTitle = "관리자 보안 인증";
            let modalDesc = "설정 및 링크 관리를 위해 4자리 비밀번호를 입력하세요.\n(초기 비밀번호: 0000)";
            let modalIcon = "fa-lock text-red-500";
            let modalBg = "bg-red-600/20";
            
            if (pinMode === "check_current") {
                modalTitle = "비밀번호 변경 (1/3)";
                modalDesc = "현재 설정된 4자리 비밀번호를 입력하세요.";
                modalIcon = "fa-key text-yellow-500";
                modalBg = "bg-yellow-600/20";
            } else if (pinMode === "enter_new") {
                modalTitle = "비밀번호 변경 (2/3)";
                modalDesc = "새롭게 사용할 4자리 비밀번호를 입력하세요.";
                modalIcon = "fa-keyboard text-blue-500";
                modalBg = "bg-blue-600/20";
            } else if (pinMode === "confirm_new") {
                modalTitle = "비밀번호 변경 (3/3)";
                modalDesc = "방금 입력한 새 비밀번호를 한 번 더 입력하세요.";
                modalIcon = "fa-check-double text-green-500";
                modalBg = "bg-green-600/20";
            }

            const currentVideoId = playlist.length > 0 && playlist[currentIndex] ? playlist[currentIndex].videoId : null;

            return (
                <div className="h-screen w-screen bg-black text-white font-sans overflow-hidden flex flex-col select-none relative" onMouseMove={handleMouseMove}>
                    
                    {/* 메인 영상 플레이어 영역 */}
                    <main className="absolute inset-0 bg-black overflow-hidden z-0">
                        
                        <div className="player-wrapper">
                            {currentVideoId && (
                                <YouTubePlayer 
                                    key={`player-${currentIndex}-${currentVideoId}`} 
                                    videoId={currentVideoId}
                                    isPlaying={isPlaying}
                                    isMuted={isMuted}
                                    isFitScreen={isFitScreen}
                                    onEnded={handleNext}
                                    onError={handleError}
                                />
                            )}
                        </div>
                        
                        {playlist.length === 0 && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center text-neutral-700 bg-black z-10">
                                <i className="fab fa-youtube text-7xl mb-6 opacity-30 text-red-600"></i>
                                <p className="text-xl font-light text-neutral-400">자물쇠 버튼을 눌러 잠금 해제 후 영상을 추가하세요</p>
                            </div>
                        )}

                        {errorMessage && (
                            <div className="absolute top-10 left-1/2 -translate-x-1/2 z-[100] bg-red-600/90 px-6 py-3 rounded-full flex items-center gap-2 shadow-2xl border border-white/20 animate-bounce">
                                <i className="fas fa-exclamation-circle"></i>
                                <span className="text-sm font-bold">{errorMessage}</span>
                            </div>
                        )}

                        {/* 하단 컨트롤 바 (HUD) */}
                        <div className={`absolute bottom-10 left-1/2 -translate-x-1/2 transition-all duration-300 z-50 ${showControls && !showPinModal ? 'translate-y-0 opacity-100' : 'translate-y-20 opacity-0 pointer-events-none'}`}>
                            <div className="bg-[#1a1a1a] border border-white/10 rounded-[2.5rem] p-4 flex items-center gap-6 shadow-2xl">
                                
                                {/* 보안 버튼 (Lock/Unlock) */}
                                <button onClick={toggleLock} className={`w-14 h-14 flex items-center justify-center rounded-2xl transition-all ${isLocked ? 'bg-red-600/20 text-red-500 hover:bg-red-600/40' : 'bg-green-600/20 text-green-500 hover:bg-green-600/40'}`} title="설정 패널 잠금/해제">
                                    <i className={`fas ${isLocked ? 'fa-lock' : 'fa-unlock'}`}></i>
                                </button>

                                <div className="h-10 w-px bg-white/20"></div>

                                <div className="flex items-center gap-3">
                                    <button onClick={() => setIsShuffle(!isShuffle)} className={`w-12 h-12 flex items-center justify-center rounded-2xl transition-all ${isShuffle ? 'bg-red-600 text-white shadow-lg shadow-red-600/30' : 'bg-white/5 text-neutral-300 hover:bg-white/20'}`} title="랜덤 재생">
                                        <i className="fas fa-random"></i>
                                    </button>
                                    <button onClick={() => setIsPlaying(!isPlaying)} className="w-16 h-16 bg-white text-black rounded-3xl flex items-center justify-center hover:scale-105 transition-all active:scale-95 shadow-xl text-2xl">
                                        {isPlaying ? <i className="fas fa-pause"></i> : <i className="fas fa-play ml-1"></i>}
                                    </button>
                                    <button onClick={handleNext} className="w-12 h-12 flex items-center justify-center bg-white/5 rounded-2xl hover:bg-white/20 text-neutral-300 transition-all shadow-lg" title="다음 영상">
                                        <i className="fas fa-step-forward"></i>
                                    </button>
                                </div>

                                <div className="h-10 w-px bg-white/20"></div>

                                <div className="flex items-center gap-3">
                                    <button onClick={() => setIsMuted(!isMuted)} className="w-12 h-12 flex items-center justify-center bg-white/5 rounded-2xl hover:bg-white/20 text-neutral-300 transition-all">
                                        {isMuted ? <i className="fas fa-volume-mute"></i> : <i className="fas fa-volume-up"></i>}
                                    </button>
                                    
                                    {/* 화면 맞춤 버튼 */}
                                    <button onClick={() => setIsFitScreen(!isFitScreen)} className={`w-12 h-12 flex items-center justify-center rounded-2xl transition-all ${isFitScreen ? 'bg-blue-600 text-white' : 'bg-white/5 text-neutral-300 hover:bg-white/20'}`} title="화면 꽉 채우기 (블랙바 제거)">
                                        <i className={`fas ${isFitScreen ? 'fa-crop-alt' : 'fa-compress'}`}></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* 💡 개선된 보안 키패드 모달 (팝업) */}
                    {showPinModal && (
                        <div className="absolute inset-0 z-[200] bg-black/80 backdrop-blur-sm flex items-center justify-center">
                            <div className="bg-[#1a1a1a] p-8 rounded-[2rem] border border-white/10 shadow-2xl flex flex-col items-center">
                                <div className={`w-16 h-16 ${modalBg} rounded-full flex items-center justify-center mb-4 transition-colors duration-300`}>
                                    <i className={`fas ${modalIcon} text-2xl`}></i>
                                </div>
                                <h2 className="text-xl font-bold mb-2">{modalTitle}</h2>
                                <p className="text-xs text-neutral-400 mb-8 text-center leading-relaxed whitespace-pre-line">{modalDesc}</p>
                                
                                <div className="flex gap-4 mb-8">
                                    {[0,1,2,3].map(i => (
                                        <div key={i} className={`w-4 h-4 rounded-full transition-all ${enteredPin.length > i ? 'bg-red-500 scale-110 shadow-[0_0_10px_rgba(239,68,68,0.8)]' : 'bg-white/10'}`}></div>
                                    ))}
                                </div>
                                
                                <div className="grid grid-cols-3 gap-4">
                                    {[1,2,3,4,5,6,7,8,9].map(num => (
                                        <button key={num} onClick={() => handlePinInput(num.toString())} className="w-20 h-20 bg-white/5 rounded-2xl text-2xl font-bold hover:bg-white/10 active:scale-95 transition-all text-neutral-200">{num}</button>
                                    ))}
                                    <button onClick={() => setEnteredPin('')} className="w-20 h-20 bg-white/5 rounded-2xl text-sm font-bold text-red-400 hover:bg-white/10 active:scale-95 transition-all">CLEAR</button>
                                    <button onClick={() => handlePinInput('0')} className="w-20 h-20 bg-white/5 rounded-2xl text-2xl font-bold hover:bg-white/10 active:scale-95 transition-all text-neutral-200">0</button>
                                    <button onClick={() => {setShowPinModal(false); setEnteredPin(''); setPinMode("unlock");}} className="w-20 h-20 bg-white/5 rounded-2xl text-sm font-bold text-neutral-400 hover:bg-white/10 active:scale-95 transition-all">취소/닫기</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 우측 관리자 패널 (잠금 해제 상태에서만 나타남) */}
                    <aside className={`absolute right-0 top-0 bottom-0 w-[400px] bg-[#101010] border-l border-white/10 flex flex-col transition-transform duration-500 ease-out z-[70] shadow-2xl ${(showControls && !isLocked && !showPinModal) ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="p-8 border-b border-white/10 bg-transparent">
                            <div className="flex items-center justify-between mb-8">
                                <div className="flex items-center gap-4">
                                    <div className="w-10 h-10 bg-green-600 rounded-xl flex items-center justify-center shadow-lg shadow-green-600/30">
                                        <i className="fas fa-unlock text-white"></i>
                                    </div>
                                    <div>
                                        <h3 className="text-lg font-bold tracking-tight">관리자 패널</h3>
                                        <p className="text-[10px] text-neutral-400 font-bold uppercase tracking-widest">Unlocked Asset</p>
                                    </div>
                                </div>
                                <button onClick={() => setShowBulkAdd(!showBulkAdd)} className="text-[10px] font-bold bg-white/10 hover:bg-white/20 px-3 py-2 rounded-lg text-white transition-colors uppercase">
                                    일괄 작업
                                </button>
                            </div>

                            {showBulkAdd ? (
                                <div className="space-y-4">
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-xs text-neutral-400 font-bold">링크 가져오기 / 내보내기</span>
                                        <button onClick={exportPlaylist} className="text-xs text-blue-400 hover:text-blue-300 underline font-bold">
                                            <i className="fas fa-file-export mr-1"></i>현재 목록 추출
                                        </button>
                                    </div>
                                    <textarea 
                                        value={bulkInput}
                                        onChange={(e) => setBulkInput(e.target.value)}
                                        placeholder="유튜브 주소들을 줄바꿈으로 입력하세요..."
                                        className="w-full h-32 bg-black/60 border border-white/20 rounded-2xl px-5 py-4 text-xs focus:border-blue-500 outline-none transition-all placeholder:text-neutral-600 resize-none custom-scrollbar text-white"
                                    ></textarea>
                                    <div className="flex gap-2">
                                        <button onClick={handleBulkAdd} className="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl text-xs font-bold transition-all shadow-lg shadow-blue-600/30 text-white">목록 덮어쓰기</button>
                                        <button onClick={() => setShowBulkAdd(false)} className="px-5 py-3 bg-white/10 hover:bg-white/20 rounded-xl text-xs font-bold text-white transition-all">취소</button>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex gap-2">
                                    <input 
                                        type="text" 
                                        value={inputUrl}
                                        onChange={(e) => setInputUrl(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && addVideo()}
                                        placeholder="유튜브 영상 링크 붙여넣기..."
                                        className="flex-1 bg-black/60 border border-white/20 rounded-xl px-5 py-3 text-xs focus:border-green-500 outline-none transition-all placeholder:text-neutral-600 text-white"
                                    />
                                    <button onClick={addVideo} className="bg-green-600 hover:bg-green-700 w-12 rounded-xl flex items-center justify-center transition-all active:scale-95 shadow-lg shadow-green-600/30 text-white">
                                        <i className="fas fa-plus"></i>
                                    </button>
                                </div>
                            )}
                        </div>

                        {/* 리스트 영역 */}
                        <div className="flex-1 overflow-y-auto p-6 custom-scrollbar bg-transparent">
                            <div className="space-y-3">
                                {playlist.length === 0 && (
                                    <div className="text-center py-24 flex flex-col items-center gap-5 opacity-40">
                                        <i className="fas fa-list text-5xl text-neutral-500"></i>
                                        <p className="text-neutral-400 text-xs font-medium">등록된 영상이 없습니다</p>
                                    </div>
                                )}
                                {playlist.map((video, index) => (
                                    <div key={video.id} className={`group p-4 rounded-2xl flex items-center gap-5 transition-all cursor-pointer ${currentIndex === index ? 'bg-white/10 border border-white/20 shadow-lg' : 'bg-black/40 border border-white/5 hover:bg-white/10'}`} onClick={() => {setCurrentIndex(index); setIsPlaying(true);}}>
                                        <div className="relative w-24 h-14 rounded-xl overflow-hidden flex-shrink-0 shadow-lg border border-white/10">
                                            <img src={`https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg`} className="w-full h-full object-cover" alt="썸네일" />
                                            {currentIndex === index && (
                                                <div className="absolute inset-0 bg-black/60 flex items-center justify-center backdrop-blur-[1px]">
                                                    <div className="w-2 h-2 bg-white rounded-full animate-ping"></div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex-1 overflow-hidden">
                                            <p className="text-[10px] text-neutral-400 font-bold mb-1 uppercase tracking-widest">Video {String(index + 1).padStart(2, '0')}</p>
                                            <p className="text-xs font-bold truncate text-white uppercase tracking-tight">ID: {video.videoId}</p>
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); removeVideo(video.id); }} className="opacity-0 group-hover:opacity-100 text-neutral-500 hover:text-red-500 transition-all p-2">
                                            <i className="fas fa-trash"></i>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 시스템 상태 하단 바 (잠금 및 비밀번호 변경) */}
                        <div className="p-8 bg-[#0a0a0a] border-t border-white/10 text-[10px] font-bold text-neutral-500 flex flex-col gap-4">
                            <div className="flex justify-between items-center bg-black/50 p-3 rounded-xl border border-white/5 cursor-pointer hover:bg-white/5 transition-colors" onClick={() => { setPinMode("check_current"); setShowPinModal(true); }} title="비밀번호 재설정">
                                <span className="flex items-center gap-2"><i className="fas fa-key text-yellow-500"></i> PASSWORD</span>
                                <span className="text-yellow-500 underline">비밀번호 변경</span>
                            </div>
                            <div className="flex justify-between items-center bg-black/50 p-3 rounded-xl border border-white/5 cursor-pointer hover:bg-white/5 transition-colors" onClick={toggleLock} title="다시 잠그기">
                                <span className="flex items-center gap-2"><i className="fas fa-shield-alt text-green-500"></i> SECURITY</span>
                                <span className="text-green-500 underline">잠금 모드로 전환</span>
                            </div>
                        </div>
                    </aside>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
